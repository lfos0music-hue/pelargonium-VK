<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.bundle.js"></script>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.error('Global error:', msg, 'at', url, ':', line, ':', col, error);
        return false;
      };
      try {
        vkBridge.send('VKWebAppInit');
        console.log('VK Bridge Init sent from HTML');
      } catch (e) {
        console.error('VK Bridge Init failed in HTML', e);
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; gap: 10px;">
        <div>Загрузка каталога...</div>
        <div style="font-size: 12px; color: #888;">Если загрузка не идет, попробуйте обновить страницу</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
