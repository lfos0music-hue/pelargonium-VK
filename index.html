<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Пеларгонии России</title>
    <style>
      body { margin: 0; padding: 0; background-color: #f8fafc; }
      #loading-screen {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: -apple-system, system-ui, "Helvetica Neue", Roboto, sans-serif;
        color: #64748b;
        padding: 20px;
        text-align: center;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e2e8f0;
        border-top-color: #0077ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.bundle.js"></script>
    <script>
      // Мгновенная инициализация сразу после загрузки скрипта
      if (typeof vkBridge !== 'undefined') {
        vkBridge.send('VKWebAppInit', {});
        console.log('VK Bridge Init sent from head');
      }
      
      // Запасной вариант на случай задержки
      document.addEventListener('DOMContentLoaded', function() {
        if (typeof vkBridge !== 'undefined') {
          vkBridge.send('VKWebAppInit', {});
        }
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div id="loading-screen">
        <div class="spinner"></div>
        <div style="font-weight: 600; font-size: 18px; color: #1e293b; margin-bottom: 8px;">Пеларгонии России</div>
        <div style="font-size: 14px;">Загрузка магазина...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
